name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (build, vet, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: smartscan
          POSTGRES_PASSWORD: smartscan
          POSTGRES_DB: smartscan_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U smartscan"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build & vet
        working-directory: backend
        run: |
          go build ./...
          go vet ./...
      - name: Test
        working-directory: backend
        env:
          TEST_DATABASE_URL: "host=localhost port=5432 user=smartscan password=smartscan dbname=smartscan_test sslmode=disable TimeZone=UTC"
        run: go test ./...

  frontend:
    name: Frontend (build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Test
        working-directory: frontend
        run: npm run test -- --run
      - name: Build
        working-directory: frontend
        run: npm run build

  secret-scan:
    name: Secret / credential guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for committed secrets and private keys
        run: |
          set -e
          # Generic high-signal patterns only (no company-name allowlist).
          patterns='-----BEGIN [A-Z ]*PRIVATE KEY-----|ghp_[A-Za-z0-9]{36}|gho_[A-Za-z0-9]{36}|AKIA[0-9A-Z]{16}|xox[baprs]-[0-9A-Za-z-]{10,}|SG\.[A-Za-z0-9_-]{16,}'
          if git grep -nIE "$patterns" -- ':!*.example' ':!package-lock.json'; then
            echo "::error::Potential secret detected in tracked files"
            exit 1
          fi
          # A real .env must never be committed (only .env.example is allowed).
          if git ls-files | grep -E '(^|/)\.env$|(^|/)\.env\.(production|local)$'; then
            echo "::error::A .env file is tracked — only .env.example may be committed"
            exit 1
          fi
          echo "No secrets detected."
