# smartscan Production Docker Compose
# Optimized for 2GB RAM VPS
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Note: This file uses .env.production for environment variables

services:
  postgres:
    image: postgres:18-alpine
    container_name: smartscan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # PostgreSQL tuning for 2GB RAM VPS
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c maintenance_work_mem=64MB
      -c work_mem=4MB
      -c max_connections=50
      -c checkpoint_completion_target=0.9
      -c wal_buffers=4MB
      -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smartscan_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: redis:8-alpine
    container_name: smartscan_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # Redis tuning for low memory
    # ${VAR:+...} expands to nothing when REDIS_PASSWORD is empty/unset, so a
    # blank password runs redis without auth (reachable only on the internal
    # Docker network) instead of crashing on a bare --requirepass flag.
    command: >
      redis-server
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
      --maxmemory 100mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a ${REDIS_PASSWORD}} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartscan_network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: smartscan_backend
    restart: unless-stopped
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - DB_SSL_INTERNAL_NETWORK=${DB_SSL_INTERNAL_NETWORK:-false}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
      - SCAN_SIGNATURE_SECRET=${SCAN_SIGNATURE_SECRET}
      - JWT_REFRESH_HOURS=${JWT_REFRESH_HOURS:-168}
      - SERVER_PORT=8080
      - FRONTEND_URL=${FRONTEND_URL}
      # Email Queue
      # Midtrans (Payment)
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      # Error Tracking (optional)
      - SENTRY_DSN=${SENTRY_DSN:-}
      - GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN:-}
      # Cloudflare R2 Storage
      - R2_ENABLED=${R2_ENABLED:-false}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      # Telegram Notifications
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - ./frontend/public/legal:/app/frontend/public/legal:ro
    networks:
      - smartscan_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_APP_NAME=${VITE_APP_NAME:-smartscan}
        - VITE_APP_TAGLINE=${VITE_APP_TAGLINE:-}
    container_name: smartscan_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    networks:
      - smartscan_network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  smartscan_network:
    driver: bridge
