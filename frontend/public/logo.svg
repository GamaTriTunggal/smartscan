<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 64" role="img" aria-label="smartscan">
  <!-- QR finder-pattern mark -->
  <g fill="currentColor" color="#0a0a0a">
    <rect x="4"  y="4"  width="24" height="24" rx="4" fill="none" stroke="#0a0a0a" stroke-width="5"/>
    <rect x="12" y="12" width="8"  height="8"  rx="1.5" fill="#0a0a0a"/>
    <rect x="36" y="4"  width="10" height="10" rx="2" fill="#0a0a0a"/>
    <rect x="4"  y="36" width="10" height="10" rx="2" fill="#0a0a0a"/>
    <rect x="20" y="36" width="10" height="10" rx="2" fill="#0a0a0a" opacity="0.45"/>
    <rect x="36" y="20" width="10" height="10" rx="2" fill="#0a0a0a" opacity="0.45"/>
    <rect x="36" y="36" width="24" height="24" rx="4" fill="none" stroke="#0a0a0a" stroke-width="5"/>
    <rect x="44" y="44" width="8"  height="8"  rx="1.5" fill="#0a0a0a"/>
  </g>
  <text x="76" y="43" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="34" font-weight="700" letter-spacing="-0.5" fill="#0a0a0a">smartscan</text>
</svg>
